<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dengbêj · Şarkı Sözleri</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg: #1a1410;
    --surface: #231c16;
    --surface2: #2d2318;
    --border: #3d3028;
    --accent: #c4853a;
    --accent-dim: #8a5a22;
    --text: #e8ddd0;
    --text-muted: #8a7a6a;
    --text-faint: #4a3f35;
    --highlight: #f0c070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.02em;
    flex: 1;
  }

  .logo span {
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    display: block;
    line-height: 1;
    margin-top: 2px;
  }

  /* ── SEARCH ── */
  .search-wrap {
    padding: 14px 16px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 68px;
    z-index: 99;
  }

  .search-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px 10px 38px;
    outline: none;
    transition: border-color .2s;
  }

  .search-wrap input::placeholder { color: var(--text-faint); }
  .search-wrap input:focus { border-color: var(--accent-dim); }

  .search-icon {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    pointer-events: none;
    font-size: 15px;
  }

  .search-rel { position: relative; }

  /* ── LANGUAGE TABS ── */
  .lang-tabs {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 120px;
    z-index: 98;
  }

  .lang-tabs::-webkit-scrollbar { display: none; }

  .lang-tab {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    transition: all .2s;
    white-space: nowrap;
  }

  .lang-tab.active, .lang-tab:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1410;
  }

  /* ── SONG LIST ── */
  .song-count {
    padding: 10px 16px 6px;
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .song-list {
    padding: 0 12px 120px;
  }

  .song-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
    border-bottom: 1px solid var(--text-faint);
    border-bottom-color: #2a2018;
  }

  .song-item:hover, .song-item.active {
    background: var(--surface2);
  }

  .song-item.active .song-title { color: var(--highlight); }

  .song-num {
    font-size: 11px;
    color: var(--text-faint);
    width: 22px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .song-info { flex: 1; min-width: 0; }

  .song-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .song-lang {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .song-arrow {
    color: var(--text-faint);
    font-size: 14px;
    flex-shrink: 0;
  }

  /* ── LYRICS PANEL (slide-in) ── */
  .lyrics-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    z-index: 200;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .lyrics-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
  }

  .back-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 18px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .panel-title-wrap { flex: 1; min-width: 0; }

  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--highlight);
    line-height: 1.2;
  }

  .panel-lang {
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .lyrics-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 60px;
    -webkit-overflow-scrolling: touch;
  }

  .lyrics-body::-webkit-scrollbar { width: 4px; }
  .lyrics-body::-webkit-scrollbar-track { background: transparent; }
  .lyrics-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .lyrics-text {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    line-height: 2;
    color: var(--text);
    white-space: pre-wrap;
  }

  .lyrics-text .stanza {
    margin-bottom: 1.6em;
  }

  /* ── OVERLAY ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 199;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
    font-size: 14px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* ── Tablet landscape: side-by-side ── */
  @media (min-width: 768px) {
    .layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .left-col {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .right-col {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    header, .search-wrap, .lang-tabs {
      position: static;
    }

    .list-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .lyrics-panel {
      position: static;
      transform: none !important;
      max-width: none;
      border-left: none;
      background: var(--bg);
    }

    .lyrics-panel .panel-header .back-btn {
      display: none;
    }

    .overlay { display: none !important; }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-faint);
      text-align: center;
      padding: 40px;
      gap: 12px;
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .welcome h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .welcome p {
      font-size: 13px;
      line-height: 1.7;
      max-width: 260px;
    }
  }

  @media (max-width: 767px) {
    .welcome { display: none; }
    .right-col { display: none; }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- LEFT: LIST -->
  <div class="left-col">
    <header>
      <div class="logo">

    </header>

      <button class="lang-tab" onclick="filterLang('Türkçe', this)">Türkçe</button>
      <button class="lang-tab" onclick="filterLang('Karma', this)">Karma</button>
    </div>

    <div class="song-count" id="songCount"></div>

    <div class="list-scroll">
      <div class="song-list" id="songList"></div>
    </div>
  </div>

  <!-- RIGHT: LYRICS -->
  <div class="right-col">
    <div class="welcome" id="welcomeMsg">
      <div class="welcome-icon">🎵</div>
      <h2>Bir şarkı seçin</h2>
      <p>Sol taraftaki listeden bir şarkıya dokunun, sözler burada görünür.</p>
    </div>
    <div class="lyrics-panel" id="lyricsPanel">
      <div class="panel-header">
        <button class="back-btn" onclick="closePanel()">←</button>
        <div class="panel-title-wrap">
          <div class="panel-title" id="panelTitle">—</div>
          <div class="panel-lang" id="panelLang"></div>
        </div>
      </div>
      <div class="lyrics-body">
        <div class="lyrics-text" id="lyricsText"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

let currentLang = 'all';
let currentIndex = -1;
let isMobile = window.innerWidth < 768;

function renderList(filtered) {
  const list = document.getElementById('songList');
  const count = document.getElementById('songCount');
  count.textContent = `${filtered.length} şarkı`;
  
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🎵</div>Şarkı bulunamadı</div>`;
    return;
  }

  list.innerHTML = filtered.map((s, i) => {
    const origIdx = songs.indexOf(s);
    return `<div class="song-item ${origIdx === currentIndex ? 'active' : ''}" onclick="openSong(${origIdx})">
      <span class="song-num">${i + 1}</span>
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-lang">${s.lang}</div>
      </div>
      <span class="song-arrow">›</span>
    </div>`;
  }).join('');
}

function filterSongs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = songs;
  if (currentLang !== 'all') filtered = filtered.filter(s => s.lang === currentLang);
  if (q) filtered = filtered.filter(s => s.title.toLowerCase().includes(q));
  renderList(filtered);
}

function filterLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  filterSongs();
}

function openSong(idx) {
  currentIndex = idx;
  const s = songs[idx];
  document.getElementById('panelTitle').textContent = s.title;
  document.getElementById('panelLang').textContent = s.lang;
  document.getElementById('lyricsText').textContent = s.lyrics;
  
  isMobile = window.innerWidth < 768;
  if (isMobile) {
    document.getElementById('lyricsPanel').classList.add('open');
    document.getElementById('overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  } else {
    document.getElementById('welcomeMsg').style.display = 'none';
    document.getElementById('lyricsPanel').style.display = 'flex';
    // scroll to top
    document.querySelector('.lyrics-body').scrollTop = 0;
  }
  filterSongs();
}

function closePanel() {
  document.getElementById('lyricsPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

window.addEventListener('resize', () => {
  isMobile = window.innerWidth < 768;
});

// init
renderList(songs);
